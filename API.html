<!DOCTYPE html>
<html>
<head>
<title>Jarvis AI Assistant</title>
</head>

<body>

<h2>🤖 Jarvis Voice Assistant</h2>

<button onclick="startListening()">Start Assistant</button>

<p id="status">Click the button and speak</p>

<script>

const API_KEY = "your_elevenlabs_api_key_here";

function startListening(){

const recognition = new webkitSpeechRecognition();

recognition.onstart = () => {
document.getElementById("status").innerText = "Listening...";
};

recognition.onresult = function(event){

const command = event.results[0][0].transcript.toLowerCase();

document.getElementById("status").innerText = "You said: " + command;

processCommand(command);

};

recognition.start();

}

function processCommand(command){

let response = "";

if(command.includes("hello")){
response = "Hello, how can I help you?";
}

else if(command.includes("time")){
response = "The time is " + new Date().toLocaleTimeString();
}

else if(command.includes("open youtube")){
response = "Opening YouTube";
window.open("https://youtube.com");
}

else if(command.includes("open google")){
response = "Opening Google";
window.open("https://google.com");
}

else if(command.includes("search")){
let query = command.replace("search", "");
response = "Searching for " + query;
window.open("https://www.google.com/search?q=" + query);
}

else{
response = "Sorry I did not understand.";
}

speak(response);

}

async function speak(text){

const response = await fetch(
"https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL",
{
method:"POST",
headers:{
"xi-api-key":API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({text:text})
}
);

const audioBlob = await response.blob();
const audioUrl = URL.createObjectURL(audioBlob);

const audio = new Audio(audioUrl);
audio.play();

}

</script>

</body>
</html>
